                // 修复：直接使用原始数值，不进行 *5 或 /2 的处理

            // --- CSV 解析逻辑 (增强版 - 支持 7 维指标) ---
            const parseCSV = (text) => {
                const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                const lines = normalizedText.split('\n');
                const items = [];
                let currentItem = null;
                
                const splitCSVLine = (line) => {
                    const result = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            if (inQuotes && line[i+1] === '"') {
                                current += '"'; 
                                i++;
                            } else {
                                inQuotes = !inQuotes;
                            }
                        } else if (char === ',' && !inQuotes) {
                            result.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    result.push(current.trim());
                    return result;
                };

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i];
                    if (!line || line.trim() === '' || line.replace(/,/g, '').trim() === '') continue;

                    const cols = splitCSVLine(line);
                    const id = cols[0];
                    
                    if (id) {
                        if (currentItem) items.push(currentItem);
                        
                        // 安全解析浮点数
                        const parseFloatSafe = (val) => {
                            const num = parseFloat(val);
                            return isNaN(num) ? 0 : num;
                        }

                        currentItem = {
                            id: id.replace(/\.0$/, ''), 
                            name: cols[1] || "",
                            context: cols[2] || "",
                            acoustic: cols[3] || "",
                            literature: cols[4] ? [cols[4].replace(/^"|"$/g, '')] : [],
                            era: cols[5] || "",
                            elements: cols[6] || "",
                            locations: cols[7] ? [cols[7].replace(/^"|"$/g, '')] : [],
                            time: cols[8] || "",
                            status: cols[9] || "",
                            credibility: cols[10] || "",
                            source_type: cols[11] || "",
                            culture: cols[12] || "",
                            // --- 新增：读取指标数据 (假设在列 13-19) ---
                            // 保持原始解析逻辑，不再做转换
                            metrics: {
                                T: parseFloatSafe(cols[13]),  // 典型性
                                E: parseFloatSafe(cols[14]),  // 主观排他性
                                I: parseFloatSafe(cols[15]),  // 画面感
                                A: parseFloatSafe(cols[16]),  // 关联度
                                S: parseFloatSafe(cols[17]),  // 客观排他
                                P: parseFloatSafe(cols[18]),  // 必要性
                                SM: parseFloatSafe(cols[19])  // 综合评分
                            }
                        };
                    } else if (currentItem) {
                        if (cols[4]) currentItem.literature.push(cols[4].replace(/^"|"$/g, ''));
                        if (cols[7]) currentItem.locations.push(cols[7].replace(/^"|"$/g, ''));
                    }
                }
                
                if (currentItem) items.push(currentItem);
                return items;
            };


            // --- 自动加载内置 CSV（仍可通过拖拽/上传替换） ---

                                    {/* 内容双栏布局 */}
                                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                        
                                        {/* 左栏：声学与文献 (占2/3) */}
                                        <div className="xl:col-span-2 space-y-8">
                                            <Section title="声学特征描述" icon={<Volume2 size={20}/>}>
                                                <div className="bg-white p-6 rounded-lg border border-[#e5e5e5] shadow-[0_2px_8px_rgba(0,0,0,0.04)] hover:shadow-md transition-shadow">
                                                    <p className="text-gray-700 leading-relaxed text-lg text-justify">
                                                        {selectedItem.acoustic}
                                                    </p>
                                                    <div className="mt-5 pt-4 border-t border-dashed border-gray-200">
                                                        <div className="flex items-center gap-2 mb-3">
                                                            <div className="w-1.5 h-1.5 bg-[#d4af37] rounded-full"></div>
                                                            <span className="text-xs font-bold text-gray-500 uppercase tracking-wide">环境构成元素</span>
                                                        </div>
                                                        <div className="flex flex-wrap gap-2">
                                                            {selectedItem.elements.split(/、|，/).map((el, i) => (
                                                                <span key={i} className="bg-[#f5f5f0] text-[#5c1313] px-3 py-1 rounded-md text-sm border border-transparent hover:border-[#d4af37]/30 transition-colors">
                                                                    {el.trim()}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </Section>

                                            <Section title="具体文献 / 作品考据" icon={<History size={20}/>}>
                                                <div className="space-y-4">
                                                    {selectedItem.literature.length > 0 ? (
                                                        selectedItem.literature.map((lit, idx) => (
                                                            <div key={idx} className="bg-white p-5 rounded-r-lg border-l-4 border-[#7d1a1a] shadow-sm hover:shadow hover:bg-[#fffdf5] transition-all group">
                                                                <p className="text-gray-800 text-sm leading-7 whitespace-pre-line text-justify">
                                                                    {lit}
                                                                </p>
                                                            </div>
                                                        ))
                                                    ) : (
                                                        <p className="text-gray-400 italic pl-4">暂无文献记录</p>
                                                    )}
                                                </div>
                                            </Section>
                                        </div>

                                        {/* 右栏：认知画像与文化 (占1/3) */}
                                        <div className="space-y-8">
                                            
                                            {/* 新增：主观认知雷达图 */}
                                            <div className="bg-white p-5 rounded-lg shadow-md border border-[#d4af37]/30 relative overflow-hidden">
                                                <h3 className="font-serif-sc font-bold text-lg mb-4 flex items-center gap-2 text-[#7d1a1a] border-b border-gray-100 pb-2">
                                                    <Activity size={18} className="text-[#d4af37]" /> 人因实验・主观认知
                                                </h3>
                                                <AcousticRadar metrics={selectedItem.metrics} name={selectedItem.name} />
                                                <div className="text-[10px] text-gray-400 text-center mt-2">
                                                    * 基于真实人因实验数据的 7 维主观评价
                                                </div>
                                            </div>

                                            {/* 文化内涵 */}
                                            <div className="bg-[#7d1a1a] text-[#fcfaf2] p-6 rounded-lg shadow-lg relative overflow-hidden group">
                                                <div className="absolute -top-6 -right-6 p-4 opacity-10 group-hover:opacity-20 transition-opacity duration-500 rotate-12">
                                                    <Wind size={140} />
                                                </div>
                                                <h3 className="font-serif-sc font-bold text-lg mb-4 border-b border-[#d4af37]/50 pb-2 flex items-center gap-2 relative z-10">
                                                    <Scroll size={18} className="text-[#d4af37]" /> 文化内涵
                                                </h3>
                                                <p className="text-sm leading-relaxed opacity-95 font-light relative z-10 text-justify">
                                                    {selectedItem.culture}
                                                </p>
                                            </div>

                                            <Section title="空间位置分布" icon={<MapPin size={20}/>}>
                                                <div className="bg-[#efebe0] p-5 rounded-lg border border-[#d4af37]/20 shadow-inner">
                                                    <ul className="space-y-5">
                                                        {selectedItem.locations.length > 0 ? (
                                                            selectedItem.locations.map((loc, idx) => (
                                                                <li key={idx} className="flex gap-3 items-start">
                                                                    <div className="mt-0.5 min-w-[20px] h-[20px] bg-[#7d1a1a] text-white rounded-full flex items-center justify-center text-xs font-bold shadow-sm ring-2 ring-[#fcfaf2]">
                                                                        {idx + 1}
                                                                    </div>
                                                                    <p className="text-sm text-[#4a3b2a] leading-relaxed">
                                                                        {loc}
                                                                    </p>
                                                                </li>
                                                            ))
                                                        ) : (
                                                            <li className="text-gray-400 italic text-sm">暂无具体空间记载</li>
                                                        )}
                                                    </ul>
                                                </div>
                                            </Section>
                                        </div>
                                    </div>
                                    <div className="h-10"></div>
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                    <Volume2 size={48} className="text-gray-300 mb-6" />
                                    <p className="font-serif-sc text-xl text-gray-500">请从左侧选择一个声源档案</p>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const Section = ({ title, icon, children }) => (
            <div>
                <h3 className="flex items-center gap-2 text-[#7d1a1a] font-bold font-serif-sc text-lg mb-4 select-none">
                    {icon} {title}
                </h3>
                {children}
            </div>
        );

        const AttributeCard = ({ icon, label, value }) => (
            <div className="bg-white p-4 rounded border border-gray-100 shadow-sm flex items-start gap-3 hover:border-[#d4af37]/30 transition-colors">
                <div className="text-[#d4af37] mt-1 shrink-0">{icon}</div>
                <div className="min-w-0">
                    <p className="text-xs text-gray-400 uppercase tracking-wider mb-1">{label}</p>
                    <p className="text-sm font-medium text-gray-800 break-words">{value || "—"}</p>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
